version: "3.1"

intents:
  - greet
  - goodbye
  - set_username
  - bot_challenge
  - welcome
  - ask_for_definition
  - ask_for_examples
  - ask_for_explanation
  - ask_for_summary
  - generate_menu_buttons
  - create_topic
  - custom_teacher_query

slots:

  user_query:
    type: text
    mappings:
      - type: custom

  materials_location:
    type: list
    mappings:
      - type: custom

  bot_response:
    type: text
    mappings:
      - type: custom
  
  user_id:
    type: text
    mappings:
      - type: custom

  user_email:
    type: text
    mappings:
      - type: custom

  input_time:
    type: text
    mappings:
      - type: custom

  username:
    type: text
    initial_value: "there"
    mappings:
      - type: custom 
  
responses:

  utter_greet:
  - text: "Hello {username}! How can I help you today?"
  - text: "Hi {username}! How can I assist you today?"
  - text: "Hey {username}!👋 What can I do for you today?"

  utter_goodbye:
  - text: "Goodbye! Have a great day!"
  - text: "See you later! Take care!"
  - text: "Bye! If you need anything else, just let me know."
  - text: "Goodbye! If you have more questions, feel free to ask."
  - text: "See you later! If you need anything else, just let me know."

  utter_welcome:
  - text: "You're welcome! If you have any more questions, feel free to ask."
  - text: "You're welcome! If you need anything else, just let me know."
  - text: "You don't need to thank me! I'm here to help you."
  - text: "You're welcome! I'm here to assist you with your learning."

  utter_bot_challenge:
  - text: "I am Engi-Bot, created to assist you with your learning."
  - text: "I am Engi-Bot, designed to help you with your class materials."
  - text: "My name is Engi-Bot, I'am here to assist you with your learning needs."
  - text: "I am Engi-Bot. I specialize in assisting with course-related questions. Do you need help with something specific?"
  - text: "My name is Engi-Bot, I can help you with your class materials. Do you have any questions?"
  - text: "I am Engi-Bot, I'm here to help with class materials and learning support. Let me know what you need!"

  utter_create_topic:
  - text: "Creating topic..."

  utter_generate_menu_buttons:
  - text: "creating menu..."
    buttons:
    - title: "Generate initial menu"
      payload: "/generate_initial_menu"
    - title: "Generate themes menu"
      payload: "/generate_themes_menu"

actions:
- action_set_username
- action_get_definition
- action_get_examples
- action_get_explanation
- action_get_summary
- action_get_class_material_location
- action_generate_initial_menu_buttons
- action_create_topic
- action_teacher_custom_question

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true